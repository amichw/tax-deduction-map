    * { margin: 0; padding: 0; box-sizing: border-box; }

      display: flex;

    /* ── Header ── */
    header {

      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e2b96a;
      white-space: nowrap;
    }

    /* ── Filter panel ── */
    .filter-panel {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 200px;
    }

    .filter-group label {
      font-size: 0.72rem;
      color: #9fb3d4;
      letter-spacing: 0.03em;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;

      height: 4px;
      border-radius: 2px;

      cursor: pointer;

      font-weight: 600;
      min-width: 64px;
      text-align: left;

    .rate-checkboxes {

      flex-wrap: wrap;
    }

    .rate-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #1e2a45;
      border: 1px solid #334;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .rate-chip:hover { border-color: #e2b96a; }
    .rate-chip.active {
      background: #e2b96a22;
      border-color: #e2b96a;
      color: #e2b96a;
    }
    .rate-chip input { display: none; }
    .filter-group:has(#rate-chips) { display: none; }

    /* Search box */
    .search-group { min-width: 180px; }
    .search-wrapper { position: relative; }

    #search-input {
      width: 100%;
      padding: 6px 10px;
      background: #2a2a3e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #eee;
      font-size: 14px;
      box-sizing: border-box;
    }
    #search-input:focus { outline: none; border-color: #7c83fd; }

    .search-dropdown {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: #1e1e2e;
      border: 1px solid #444;
      border-radius: 0 0 6px 6px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 9999;
    }
    .search-dropdown.hidden { display: none; }

    .search-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #ddd;
      text-align: right;
      direction: rtl;
    }
    .search-item:hover, .search-item.active { background: #2a2a4e; color: #fff; }

    /* Stats bar */
    .stats-bar {
      font-size: 0.72rem;
      color: #6a8aac;
      white-space: nowrap;
    }

    #count-badge {
      color: #e2b96a;
      font-weight: 700;
    }

    /* ── Map ── */
    #map {
      flex: 1;
    }

    /* ── Legend ── */
    .legend {
      background: #16213eee;
      border: 1px solid #334;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.72rem;
      line-height: 1.8;
      direction: rtl;
      min-width: 160px;
    }
    .legend h4 {
      color: #e2b96a;
      margin-bottom: 6px;
      font-size: 0.78rem;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);

    }

    /* ── Custom Tooltip ── */
    .settlement-tooltip {

    }

    .settlement-tooltip .tt-val { font-weight: 600; color: #e0e0e0; direction: ltr; }

    .leaflet-tooltip {

      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }
    .leaflet-tooltip::before { display: none !important; }

// ═══════════════════════════════════════
//  COLOR SCALE by deduction amount
// ═══════════════════════════════════════
const COLOR_SCALE = [
  { max: 15000, color: "#4fc3f7", label: "עד 15,000 ₪" },
  { max: 20000, color: "#29b6f6", label: "15,001–20,000 ₪" },
  { max: 26000, color: "#ffd54f", label: "20,001–26,000 ₪" },
  { max: 32000, color: "#ffb300", label: "26,001–32,000 ₪" },
  { max: 46000, color: "#ff7043", label: "32,001–46,000 ₪" },
  { max: Infinity, color: "#e53935", label: "מעל 46,000 ₪" },
];

function getColor(deduction) {
  for (const band of COLOR_SCALE) {
    if (deduction <= band.max) return band.color;
  }
  return COLOR_SCALE[COLOR_SCALE.length - 1].color;
}

// Radius scales with deduction (6–16 px)
function getRadius(deduction) {
  const MIN_D = 10265, MAX_D = 53568;
  const MIN_R = 5, MAX_R = 15;
  return MIN_R + ((deduction - MIN_D) / (MAX_D - MIN_D)) * (MAX_R - MIN_R);
}

function fmt(n) {
  return Number(n).toLocaleString("he-IL");
}

// ═══════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════
const map = L.map("map", {
  center: [31.5, 35.0],
  zoom: 8,
  zoomControl: true,
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd",
  maxZoom: 19,
}).addTo(map);

// ═══════════════════════════════════════
//  LEGEND
// ═══════════════════════════════════════
const legend = L.control({ position: "bottomright" });
legend.onAdd = () => {
  const div = L.DomUtil.create("div", "legend");
  div.innerHTML = "<h4>ניכוי שנתי (₪)</h4>" +
    COLOR_SCALE.map(b =>
      `<div class="legend-row">
        <div class="legend-dot" style="background:${b.color}"></div>
        <span>${b.label}</span>
      </div>`
    ).join("");
  return div;
};
legend.addTo(map);

// ═══════════════════════════════════════
//  MARKERS
// ═══════════════════════════════════════
const markers = [];

SETTLEMENTS.forEach(s => {
  if (s.lat == null || s.lon == null) return;

  const color = getColor(s.deduction);
  const radius = getRadius(s.deduction);

  const circle = L.circleMarker([s.lat, s.lon], {
    radius,
    fillColor: color,
    color: "rgba(255,255,255,0.25)",
    weight: 1,
    fillOpacity: 0.85,
  });

  const tooltipHtml = `
    <div class="settlement-tooltip">
      <div class="tt-name">${s.name}</div>
      <div class="tt-row"><span class="tt-label">שיעור ניכוי</span><span class="tt-val">${s.rate}%</span></div>
      <div class="tt-row"><span class="tt-label">תקרה</span><span class="tt-val">₪${fmt(s.ceiling)}</span></div>
      <div class="tt-row"><span class="tt-label">ניכוי שנתי</span><span class="tt-val">₪${fmt(s.deduction)}</span></div>
    </div>`;

  circle.bindTooltip(tooltipHtml, {
    permanent: false,
    direction: "top",
    opacity: 1,
    offset: [0, -radius],
  });

  circle._settlementData = s;
  circle.addTo(map);
  markers.push(circle);
});

// ═══════════════════════════════════════
//  RATE CHIPS
// ═══════════════════════════════════════
const allRates = [...new Set(SETTLEMENTS.map(s => s.rate))].sort((a, b) => a - b);
let activeRates = new Set(allRates);

const rateContainer = document.getElementById("rate-chips");
allRates.forEach(rate => {
  const chip = document.createElement("label");
  chip.className = "rate-chip active";
  chip.innerHTML = `<input type="checkbox" value="${rate}" checked />${rate}%`;
  chip.addEventListener("click", () => {
    if (activeRates.has(rate)) {
      activeRates.delete(rate);
      chip.classList.remove("active");
    } else {
      activeRates.add(rate);
      chip.classList.add("active");
    }
    applyFilters();
  });
  rateContainer.appendChild(chip);
});

// ═══════════════════════════════════════
//  SLIDERS
// ═══════════════════════════════════════
const sliderMin = document.getElementById("slider-min");
const sliderMax = document.getElementById("slider-max");
const valMin = document.getElementById("val-min");
const valMax = document.getElementById("val-max");
const countBadge = document.getElementById("count-badge");

function updateSliderDisplay() {
  valMin.textContent = fmt(sliderMin.value);
  valMax.textContent = fmt(sliderMax.value);
}

sliderMin.addEventListener("input", () => {
  if (+sliderMin.value > +sliderMax.value) sliderMin.value = sliderMax.value;
  updateSliderDisplay();
  applyFilters();
});

sliderMax.addEventListener("input", () => {
  if (+sliderMax.value < +sliderMin.value) sliderMax.value = sliderMin.value;
  updateSliderDisplay();
  applyFilters();
});

// ═══════════════════════════════════════
//  FILTER LOGIC
// ═══════════════════════════════════════
function applyFilters() {
  const minD = +sliderMin.value;
  const maxD = +sliderMax.value;
  let visible = 0;

  markers.forEach(marker => {
    const s = marker._settlementData;
    const show = s.deduction >= minD && s.deduction <= maxD && activeRates.has(s.rate);
    if (show) {
      marker.setStyle({ opacity: 1, fillOpacity: 0.85 });
      marker.getElement() && (marker.getElement().style.pointerEvents = "auto");
      visible++;
    } else {
      marker.setStyle({ opacity: 0, fillOpacity: 0 });
      marker.getElement() && (marker.getElement().style.pointerEvents = "none");
    }
  });

  countBadge.textContent = visible;
}

// Initial render
updateSliderDisplay();
applyFilters();

// ── SEARCH / AUTOCOMPLETE ──────────────────────────────────
const searchInput    = document.getElementById("search-input");
const searchDropdown = document.getElementById("search-dropdown");

// Map name → marker for fast lookup
const markerByName = {};
markers.forEach(m => { markerByName[m._settlementData.name] = m; });

function showDropdown(results) {
  searchDropdown.innerHTML = "";
  if (results.length === 0) { searchDropdown.classList.add("hidden"); return; }
  results.forEach(s => {
    const item = document.createElement("div");
    item.className = "search-item";
    item.textContent = s.name;
    item.addEventListener("mousedown", e => {   // mousedown fires before blur
      e.preventDefault();
      selectSettlement(s);
    });
    searchDropdown.appendChild(item);
  });
  searchDropdown.classList.remove("hidden");
}

function hideDropdown() {
  searchDropdown.classList.add("hidden");
}

function selectSettlement(s) {
  searchInput.value = "";
  hideDropdown();

  const latlng = [s.lat, s.lon];

  // Pan only if settlement is outside the current viewport
  if (!map.getBounds().contains(latlng)) {
    map.panTo(latlng, { animate: true });
  }

  // Open tooltip
  const marker = markerByName[s.name];
  if (marker) marker.openTooltip();

  // Concentric highlight rings (pixel-fixed so always visible at any zoom)
  const rings = [
    L.circleMarker(latlng, { radius: 14, color: '#e2b96a', weight: 2.5, fillOpacity: 0, opacity: 0.95 }),
    L.circleMarker(latlng, { radius: 24, color: '#e2b96a', weight: 1.5, fillOpacity: 0, opacity: 0.60 }),
    L.circleMarker(latlng, { radius: 36, color: '#e2b96a', weight: 1,   fillOpacity: 0, opacity: 0.30 }),
  ].map(r => r.addTo(map));

  // Dismiss rings on map interaction, but not before 2.2s minimum
  const createdAt = Date.now();
  const MIN_MS = 2200;

  function dismissRings() {
    if (Date.now() - createdAt < MIN_MS) return; // too early, ignore
    rings.forEach(r => r.setStyle({ opacity: 0 }));
    setTimeout(() => rings.forEach(r => map.removeLayer(r)), 600);
    map.off('click dragstart zoomstart', dismissRings);
  }

  map.on('click dragstart zoomstart', dismissRings);
}

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim();
  if (q.length < 2) { hideDropdown(); return; }
  const matches = SETTLEMENTS
    .filter(s => s.lat != null && s.name.includes(q))
    .slice(0, 15);
  showDropdown(matches);
});

searchInput.addEventListener("keydown", e => {
  if (e.key === "Escape") { hideDropdown(); searchInput.blur(); }
});

searchInput.addEventListener("blur", () => {
  setTimeout(hideDropdown, 150);   // delay so mousedown fires first
});
</script>
